<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínicas</title>
    <!-- Mantenho apenas o essencial para os ícones -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    
    <style>
        :root { 
            --azul-escuro: #0056b3; 
            --azul-claro: #00a2ff;
            --fonte-principal: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }

        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            font-family: var(--fonte-principal); 
            overflow: hidden; 
        }

        /* SHIMMER AZUL IDENTICO - Adicionei apenas will-change para velocidade */
        .shimmer-text {
            background: linear-gradient(90deg, var(--azul-escuro) 0%, var(--azul-claro) 25%, var(--azul-escuro) 50%, var(--azul-claro) 75%, var(--azul-escuro) 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 3s linear infinite;
            font-weight: bold;
            will-change: background-position;
        }

        @keyframes shimmer { to { background-position: 200% center; } }

        .layout { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR AZUL IDENTICA */
        .sidebar {
            width: 250px;
            background-color: var(--azul-escuro);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            color: white;
        }

        .sb-logo { padding: 0 20px 30px; display: flex; flex-direction: column; gap: 10px; }
        .logo-icone { width: 40px; }
        .logo-texto { width: 120px; filter: brightness(0) invert(1); }

        .sb-menu { list-style: none; padding: 0; margin: 0; }
        .sb-menu li { padding: 12px 20px; }
        .sb-menu li a { text-decoration: none; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 10px; }
        .sb-menu li.active { background: rgba(255,255,255,0.15); border-left: 4px solid var(--azul-claro); }
        .sb-menu li.active a { color: white; font-weight: bold; }

        .clinicas-main { display: flex; flex-direction: column; flex: 1; overflow: hidden; background: #fff; }

        .clinicas-topo { 
            padding: 20px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .btn-voltar {
            background-color: var(--azul-escuro) !important;
            color: white !important;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
        }

        .conteudo-central { display: flex; flex: 1; overflow: hidden; }
        .clinicas-lista { width: 350px; overflow-y: auto; padding: 20px; border-right: 1px solid #eee; }
        
        .card-clinica {
            padding: 15px; border: 1px solid #eee; margin-bottom: 12px; border-radius: 12px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .card-clinica.ativo { border-left: 6px solid var(--azul-escuro); background: #f0f7ff; }

        .clinicas-mapa { flex: 1; }
        #mapa { width: 100%; height: 100%; border: none; }

        /* RODAPÉ IDENTICO */
        .footer-controles {
            height: 90px; background: #fff; border-top: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center; padding: 0 30px;
        }

        .btn-rota {
            background-color: var(--azul-escuro); color: white; border: none;
            padding: 12px 22px; border-radius: 8px; cursor: pointer;
            font-family: var(--fonte-principal); font-weight: bold;
        }

        /* BALÃO ANIMADO IDENTICO */
        .ajuda-container { display: flex; align-items: center; gap: 10px; text-decoration: none; animation: float 3s ease-in-out infinite; }
        .balao-ajuda {
            background: #f8f9fa; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px;
            position: relative; color: #333; font-size: 0.9rem; font-weight: 500;
        }
        .balao-ajuda::after {
            content: ''; position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
            border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 8px solid #f8f9fa;
        }
        .ajuda-container img { width: 55px; height: 55px; object-fit: contain; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sb-logo">
                <img src="../assets/img/logo-icone.png" class="logo-icone" loading="lazy">
                <img src="../assets/img/logo-texto.png" class="logo-texto" loading="lazy">
            </div>
            <ul class="sb-menu">
                <li><a href="../index.html"><i class="bi bi-house-fill"></i> Home</a></li>
                <li class="active"><a href="#"><i class="bi bi-geo-alt-fill"></i> Clínicas</a></li>
            </ul>
        </nav>

        <main class="clinicas-main">
            <div class="clinicas-topo">
                <h1 class="shimmer-text" style="margin:0">Clínicas próximas</h1>
                <a href="../index.html" class="btn-voltar"><i class="bi bi-arrow-left"></i> Voltar</a>
            </div>

            <div class="conteudo-central">
                <aside class="clinicas-lista">
                    <input type="text" placeholder="Buscar clínica..." id="busca" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:20px; outline: none;">
                    
                    <div class="card-clinica ativo" onclick="mudarMapa(0)">
                        <h5 class="shimmer-text">Vila Olímpia</h5>
                        <p>20 min • Aberta</p>
                    </div>
                    <div class="card-clinica" onclick="mudarMapa(1)">
                        <h5 class="shimmer-text">Brooklin</h5>
                        <p>25 min • Aberta</p>
                    </div>
                    <div class="card-clinica" onclick="mudarMapa(2)">
                        <h5 class="shimmer-text">Alphaville</h5>
                        <p>40 min • Aberta</p>
                    </div>
                </aside>

                <section class="clinicas-mapa">
                    <iframe id="mapa" src="https://google.com" loading="lazy"></iframe>
                </section>
            </div>

            <footer class="footer-controles">
                <div class="footer-left">
                    <button class="btn-rota">Ver no Maps</button>
                    <button class="btn-rota">Ver no Waze</button>
                </div>
                <a href="#" class="ajuda-container">
                    <div class="balao-ajuda">Precisa de ajuda?</div>
                    <img src="../assets/img/cachorrao3.png" loading="lazy">
                </a>
            </footer>
        </main>
    </div>
    <script src="../js/clinicas.js"></script>
</body>
</html>
