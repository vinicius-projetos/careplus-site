<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Clínicas Próximas - CarePlus</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 30%;
      background-color: #0d6efd;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-top: 0;
    }

    .search {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .clinic-card {
      background-color: white;
      color: black;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .clinic-card button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      background-color: #0d6efd;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .map-area {
      width: 70%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #dfe6e9;
      font-size: 24px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="sidebar">

      <h2>Clínicas Próximas</h2>

      <input type="text" class="search" placeholder="Buscar clínica...">

      <div class="clinic-card">
        <h3>CarePlus Vila Olímpia</h3>
        <p>Especialidade: Odontologia</p>

        <button>Ver detalhes</button>
      </div>

      <div class="clinic-card">
        <h3>CarePlus Brooklin</h3>
        <p>Especialidade: Clínica Geral</p>

        <button>Ver detalhes</button>
      </div>

    </div>

    <div class="map-area">
      Área do mapa
    </div>

  </div>

</body>

</html>
